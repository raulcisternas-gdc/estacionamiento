<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estacionamiento</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header {
    max-width: 560px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .fecha { font-size: 13px; color: #888; }
  .status-bar {
    max-width: 560px;
    margin: 0 auto 18px;
    font-size: 13px;
    color: #666;
    text-align: center;
  }
  .status-bar .verde { color: #1a7f4b; font-weight: 600; }
  .status-bar .rojo  { color: #c0392b; font-weight: 600; }
  .sync-indicator {
    max-width: 560px;
    margin: 0 auto 12px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
  }
  .sync-indicator.conectado { color: #1a7f4b; }
  .sync-indicator.error { color: #c0392b; }
  .grid-wrapper {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row-block { display: flex; flex-direction: column; gap: 6px; }
  .row-label {
    font-size: 11px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
  }
  .row-label.destacado {
    font-size: 15px;
    font-weight: 700;
    color: #444;
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .row-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .spot {
    background: #fff;
    border: 1.5px dashed #ccc;
    border-radius: 12px;
    padding: 14px 10px;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }
  .spot.empty:hover { border-color: #999; background: #f9f9f7; }
  .spot.occupied {
    background: #edfaf3;
    border: 1.5px solid #5cb882;
  }
  .spot.occupied:hover { opacity: 0.85; }
  .spot.loading { opacity: 0.5; pointer-events: none; }
  .spot-num   { font-size: 10px; color: #bbb; font-weight: 600; letter-spacing: 0.05em; }
  .spot-icon  { font-size: 28px; color: #ddd; }
  .spot-free  { font-size: 12px; color: #bbb; }
  .spot-plate { font-size: 16px; font-weight: 700; color: #1a7f4b; letter-spacing: 0.1em; }
  .spot-name  { font-size: 13px; color: #444; }
  .spot-phone { font-size: 12px; color: #888; }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    max-width: 92vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .modal .sub { font-size: 13px; color: #888; margin-bottom: 18px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  .field input {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #5cb882; }
  .error-msg { font-size: 12px; color: #c0392b; margin-top: 6px; display: none; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { background: #f0f0ee; color: #555; }
  .btn-ok     { background: #1a7f4b; color: #fff; }
  .btn-free   { width: 100%; margin-top: 10px; background: #fdecea; color: #c0392b; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-close  { width: 100%; margin-top: 8px; background: #f0f0ee; color: #555; border: none; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; }
  .info-plate { font-size: 26px; font-weight: 700; color: #1a7f4b; letter-spacing: 0.12em; margin: 6px 0; }
  .info-name  { font-size: 15px; color: #333; margin-bottom: 4px; }
  .info-phone { font-size: 14px; color: #666; }
  .info-phone a { color: #1a7f4b; text-decoration: none; }
  .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🅿️ Estacionamiento</h1>
    <p class="fecha" id="fecha"></p>
  </div>
  <p class="status-bar" style="margin:0;">
    <span class="verde" id="libres">—</span> libres &nbsp;·&nbsp;
    <span class="rojo"  id="ocupados">—</span> ocupados
  </p>
</div>

<p class="sync-indicator" id="sync-status">⏳ Conectando...</p>

<div class="grid-wrapper">
  <div class="row-block">
    <p class="row-label destacado">← ENTRADA</p>
    <div class="row-grid" id="row1"></div>
  </div>
  <div class="row-block">
    <p class="row-label">Fila del medio</p>
    <div class="row-grid" id="row2"></div>
  </div>
  <div class="row-block">
    <p class="row-label destacado">FONDO →</p>
    <div class="row-grid" id="row3"></div>
  </div>
</div>

<!-- Modal: Registrar -->
<div class="overlay" id="ov-register">
  <div class="modal">
    <h2>Registrar auto</h2>
    <p class="sub" id="reg-sub">Espacio #</p>
    <div class="field"><label>Patente</label><input id="f-plate" type="text" placeholder="ej: BCDF12" maxlength="8" /></div>
    <div class="field"><label>Nombre</label><input id="f-name"  type="text" placeholder="Tu nombre completo" /></div>
    <div class="field"><label>Teléfono</label><input id="f-phone" type="tel" placeholder="+56 9 1234 5678" /></div>
    <p class="error-msg" id="f-error">Completa todos los campos para continuar.</p>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeRegister()">Cancelar</button>
      <button class="btn btn-ok" id="btn-registrar" onclick="confirmRegister()">✓ Registrar</button>
    </div>
  </div>
</div>

<!-- Modal: Info ocupante -->
<div class="overlay" id="ov-info">
  <div class="modal">
    <p class="sub" id="info-spot"></p>
    <p class="info-plate" id="info-plate"></p>
    <p class="info-name"  id="info-name"></p>
    <p class="info-phone" id="info-phone"></p>
    <hr class="divider" />
    <button class="btn-free"  onclick="releaseSpot()">⬜ Liberar este espacio</button>
    <button class="btn-close" onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── Configuración Firebase ───────────────────────────────────────────────────
const firebaseConfig = {
  databaseURL: "https://estacionamiento-b6b39-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const TODAY = new Date().toISOString().slice(0, 10);
const REF   = db.ref('parking/' + TODAY);

let spots = {};
let selectedSpot = null;

// ── Estado de conexión ───────────────────────────────────────────────────────
db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('sync-status');
  if (snap.val()) {
    el.textContent = '🟢 En vivo — todos ven el mismo mapa';
    el.className = 'sync-indicator conectado';
  } else {
    el.textContent = '🔴 Sin conexión — reconectando...';
    el.className = 'sync-indicator error';
  }
});

// ── Escuchar cambios en tiempo real ─────────────────────────────────────────
REF.on('value', snap => {
  spots = snap.val() || {};
  render();
});

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  let free = 0, occ = 0;
  [1, 2, 3].forEach(row => {
    const el = document.getElementById('row' + row);
    el.innerHTML = '';
    [0, 1, 2].forEach(col => {
      const n = (row - 1) * 3 + col + 1;
      const d = spots[n];
      const div = document.createElement('div');
      div.className = 'spot ' + (d ? 'occupied' : 'empty');
      if (d) {
        occ++;
        div.innerHTML = `
          <span class="spot-num">#${n}</span>
          <span class="spot-plate">${d.plate}</span>
          <span class="spot-name">${d.name}</span>
          <span class="spot-phone">${d.phone}</span>`;
        div.onclick = () => openInfo(n);
      } else {
        free++;
        div.innerHTML = `
          <span class="spot-num">#${n}</span>
          <span class="spot-icon">🚗</span>
          <span class="spot-free">Libre — toca para registrar</span>`;
        div.onclick = () => openRegister(n);
      }
      el.appendChild(div);
    });
  });
  document.getElementById('libres').textContent   = free;
  document.getElementById('ocupados').textContent = occ;
}

// ── Modal Registrar ──────────────────────────────────────────────────────────
function openRegister(n) {
  selectedSpot = n;
  document.getElementById('reg-sub').textContent = 'Espacio #' + n;
  ['f-plate','f-name','f-phone'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-error').style.display = 'none';
  document.getElementById('btn-registrar').disabled = false;
  document.getElementById('ov-register').classList.add('active');
  document.getElementById('f-plate').focus();
}

function closeRegister() {
  document.getElementById('ov-register').classList.remove('active');
  selectedSpot = null;
}

function confirmRegister() {
  const plate = document.getElementById('f-plate').value.trim().toUpperCase();
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!plate || !name || !phone) {
    document.getElementById('f-error').style.display = 'block';
    return;
  }
  const btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  REF.child(selectedSpot).set({ plate, name, phone })
    .then(() => closeRegister())
    .catch(() => {
      btn.disabled = false;
      btn.textContent = '✓ Registrar';
      document.getElementById('f-error').textContent = 'Error al guardar. Revisa tu conexión.';
      document.getElementById('f-error').style.display = 'block';
    });
}

// ── Modal Info ───────────────────────────────────────────────────────────────
function openInfo(n) {
  selectedSpot = n;
  const d = spots[n];
  document.getElementById('info-spot').textContent  = 'Espacio #' + n;
  document.getElementById('info-plate').textContent = d.plate;
  document.getElementById('info-name').textContent  = d.name;
  document.getElementById('info-phone').innerHTML   =
    `<a href="tel:${d.phone}">${d.phone}</a> — toca para llamar`;
  document.getElementById('ov-info').classList.add('active');
}

function closeInfo() {
  document.getElementById('ov-info').classList.remove('active');
  selectedSpot = null;
}

function releaseSpot() {
  if (selectedSpot && spots[selectedSpot]) {
    REF.child(selectedSpot).remove()
      .then(() => closeInfo())
      .catch(() => alert('Error al liberar. Revisa tu conexión.'));
  }
}

// ── Cerrar overlay al hacer clic afuera ─────────────────────────────────────
['ov-register','ov-info'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('active');
      selectedSpot = null;
    }
  });
});

// ── Fecha ────────────────────────────────────────────────────────────────────
document.getElementById('fecha').textContent =
  new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
</script>
</body>
</html>
